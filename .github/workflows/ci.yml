name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Seuls les tests TypeScript sont exécutés en CI (rendu sans modification du dossier python/).
jobs:
  typescript-tests:
    name: TypeScript · vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run vitest
        run: npm test
